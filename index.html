  {id:135,cat:"Decision & Negotiation",       priority:"Mandatory",        status:"Pending", day:"Day 24",  assigned:"Ty",         cost:"$10–50",     task:"Notify seller in writing of decision",                                  purpose:"Formal written decision.",                                                              contact:"Seller contacts from PSA",                                                notes:""},
  {id:136,cat:"Operational/Other",            priority:"Highly Recommended",status:"Pending",day:"Day 25",  assigned:"Ty",         cost:"—",          task:"Build insurance/risk management plan",                                  purpose:"Protect against claims.",                                                               contact:"Insurance agents contacts",                                                notes:""},
  {id:137,cat:"Operational/Other",            priority:"Suggested",        status:"Pending", day:"Day 25",  assigned:"Ty",         cost:"$1k retainer",task:"Hire team via AIA Idaho",                                             purpose:"Ensure quality professional team.",                                                     contact:"aiaidaho.com",                                                            notes:""},
];

const emptyTask = () => ({task:"",cat:CATS[0],priority:"Mandatory",day:"Day 1",assigned:"",cost:"",purpose:"",contact:"",notes:"",userNotes:"",status:"Pending"});
const emptyContact = () => ({name:"",group:"Other",role:"",phone:"",email:"",web:"",note:""});
const inp = (x={}) => ({background:T.high,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 13px",color:T.text,fontFamily:T.F,fontSize:15,outline:"none",width:"100%",boxSizing:"border-box",...x});
const lbl = {fontSize:11,color:T.muted,marginBottom:5,letterSpacing:.4,display:"block"};
const card = (x={}) => ({background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:14,...x});

// ─── APP ────────────────────────────────────────────────────────────────────
const App = function() {
  const [items,    setItems]    = useState(() => BASE.map(b=>({...b,userNotes:"",_custom:false})));
  const [contacts, setContacts] = useState(DEFAULT_CONTACTS);
  const [warnings, setWarnings] = useState(DEFAULT_WARNINGS);
  // files = session refs + user uploads, all in one list
  // session refs: isRef:true, data:null until user uploads the actual file
  const [files,    setFiles]    = useState(ALL_SESSION_REF_ENTRIES);

  const [view,      setView]     = useState("dashboard");
  const [selected,  setSelected] = useState(null);  // task id
  const [editContact, setEditContact] = useState(null); // contact obj or null
  const [isAddingContact, setIsAddingContact] = useState(false);
  const [isAddingTask, setIsAddingTask] = useState(false);
  const [taskForm,  setTaskForm] = useState(emptyTask());
  const [contactForm, setContactForm] = useState(emptyContact());
  const [formSaved, setFormSaved] = useState(false);
  const [localNotes, setLocalNotes] = useState("");
  const [notesSaved, setNotesSaved] = useState(false);

  // Filters (tasks only)
  const [fCat,    setFCat]    = useState("All");
  const [fPri,    setFPri]    = useState("All");
  const [fStatus, setFStatus] = useState("All");
  const [fAssign, setFAssign] = useState("All");
  const [sortBy,  setSortBy]  = useState("day");
  const [search,  setSearch]  = useState("");
  const [showFilters, setShowFilters] = useState(false);
  const [contactSearch, setContactSearch] = useState("");
  const [fileSearch,    setFileSearch]    = useState("");

  const fileRef      = useRef();
  const refUploadRefs = useRef({});
  const taskImportRef = useRef();
  const globalFileRef = useRef();

  // ── Persist ───────────────────────────────────────────────────────────────
  const persistItems    = useCallback(async v => { try{await window.storage.set("lv6-items",JSON.stringify(v.map(i=>({id:i.id,cat:i.cat,priority:i.priority,status:i.status,day:i.day,assigned:i.assigned,cost:i.cost,task:i.task,purpose:i.purpose,contact:i.contact,notes:i.notes,userNotes:i.userNotes||"",_custom:i._custom||false}))));}catch(e){} }, []);
  const persistContacts = useCallback(async v => { try{await window.storage.set("lv6-contacts",JSON.stringify(v));}catch(e){} }, []);
  const persistWarnings = useCallback(async v => { try{await window.storage.set("lv6-warnings",JSON.stringify(v));}catch(e){} }, []);
  const persistFileMeta = useCallback(async v => { try{await window.storage.set("lv6-filemeta",JSON.stringify(v.map(f=>({id:f.id,taskId:f.taskId,name:f.name,type:f.type,size:f.size,uploadedAt:f.uploadedAt,isRef:f.isRef||false,refId:f.refId||null}))));}catch(e){} }, []);

  // ── Load ──────────────────────────────────────────────────────────────────
  useEffect(() => {
    (async()=>{
      try{const r=await window.storage.get("lv6-items");if(r?.value){const s=JSON.parse(r.value);setItems(prev=>{const m={};prev.forEach(i=>m[i.id]=i);s.forEach(x=>{if(m[x.id])m[x.id]={...m[x.id],...x};else m[x.id]=x;});return Object.values(m).sort((a,b)=>a.id-b.id);});}}catch(e){}
      try{const r=await window.storage.get("lv6-contacts");if(r?.value)setContacts(JSON.parse(r.value));}catch(e){}
      try{const r=await window.storage.get("lv6-warnings");if(r?.value)setWarnings(JSON.parse(r.value));}catch(e){}
      try{
        const r=await window.storage.get("lv6-filemeta");
        if(r?.value){
          const saved=JSON.parse(r.value); // [{id,taskId,name,type,size,uploadedAt,isRef?,refId?}]
          // Load data blobs for all saved entries
          const withData=await Promise.all(saved.map(async f=>{
            try{const d=await window.storage.get(`lv6-fd-${f.id}`);return{...f,data:d?.value||null};}catch(e){return{...f,data:null};}
          }));
          // Start from fresh session refs, then overlay any saved uploads/ref-uploads
          const base=[...ALL_SESSION_REF_ENTRIES];
          const savedMap={};withData.forEach(f=>savedMap[f.id]=f);
          // Replace matching session refs with saved version (which has data), add user uploads
          const merged=base.map(sr=>savedMap[sr.id]?{...sr,...savedMap[sr.id]}:sr);
          // Add user-uploaded files that are NOT session refs
          withData.filter(f=>!f.isRef).forEach(f=>{if(!merged.find(m=>m.id===f.id))merged.push(f);});
          setFiles(merged);
        }
      }catch(e){}
    })();
  },[]);

  // ── Derived ───────────────────────────────────────────────────────────────
  const sorted = [...items].sort((a,b)=>{
    if(sortBy==="day")      return dayNum(a.day)-dayNum(b.day);
    if(sortBy==="priority") return PRI_W[a.priority]-PRI_W[b.priority];
    if(sortBy==="status")   return STA_W[a.status]-STA_W[b.status];
    if(sortBy==="cat")      return a.cat.localeCompare(b.cat);
    if(sortBy==="assigned") return (a.assigned||"").localeCompare(b.assigned||"");
    return a.id-b.id;
  });
  const filtered = sorted.filter(i=>{
    if(fCat!=="All"&&i.cat!==fCat) return false;
    if(fPri!=="All"&&i.priority!==fPri) return false;
    if(fStatus!=="All"&&i.status!==fStatus) return false;
    if(fAssign!=="All"&&i.assigned!==fAssign) return false;
    if(search){const q=search.toLowerCase();return i.task.toLowerCase().includes(q)||i.purpose.toLowerCase().includes(q)||(i.assigned||"").toLowerCase().includes(q)||(i.userNotes||"").toLowerCase().includes(q);}
    return true;
  });
  const selItem  = selected!=null ? items.find(i=>i.id===selected) : null;
  const selIdx   = selected!=null ? filtered.findIndex(i=>i.id===selected) : -1;
  const done     = items.filter(i=>i.status==="Complete").length;
  const pct      = Math.round(done/items.length*100);
  const activeFilters = (fCat!=="All"?1:0)+(fPri!=="All"?1:0)+(fStatus!=="All"?1:0)+(fAssign!=="All"?1:0)+(search?1:0);
  const allAssignees = ["All",...Array.from(new Set(items.map(i=>i.assigned).filter(Boolean))).sort()];
  const taskFiles = selected!=null ? files.filter(f=>f.taskId===selected) : [];
  const taskRefs  = selected!=null ? files.filter(f=>f.taskId===selected&&f.isRef) : [];
  const taskUploads = selected!=null ? files.filter(f=>f.taskId===selected&&!f.isRef) : [];
  const visibleFiles = files.filter(f=>!fileSearch||f.name.toLowerCase().includes(fileSearch.toLowerCase())||(f.taskName||"").toLowerCase().includes(fileSearch.toLowerCase()));

  // ── Task mutations ────────────────────────────────────────────────────────
  const updateItem = (id,patch) => { const ni=items.map(i=>i.id===id?{...i,...patch}:i); setItems(ni); persistItems(ni); };
  const quickToggle = (e,id) => { e.stopPropagation(); const it=items.find(i=>i.id===id); if(it)updateItem(id,{status:it.status==="Complete"?"Pending":"Complete"}); };
  const saveTaskForm = () => {
    if(!taskForm.task.trim()) return;
    if(isAddingTask){
      const nid=Math.max(0,...items.map(i=>i.id))+1;
      const ni=[...items,{...taskForm,id:nid,userNotes:taskForm.userNotes||"",_custom:true}];
      setItems(ni); persistItems(ni);
    } else { updateItem(selected,{...taskForm}); }
    setFormSaved(true); setTimeout(()=>{setFormSaved(false); setView(isAddingTask?"tasks":"detail");},1200);
  };
  const deleteTask = id => { if(!window.confirm("Delete this task?")) return; const ni=items.filter(i=>i.id!==id); setItems(ni); persistItems(ni); setView("tasks"); };
  const saveNotes = () => { updateItem(selected,{userNotes:localNotes}); setNotesSaved(true); setTimeout(()=>setNotesSaved(false),1500); };

  // ── Contact mutations ──────────────────────────────────────────────────────
  const saveContactForm = () => {
    if(!contactForm.name.trim()) return;
    let nc;
    if(isAddingContact){ nc=[...contacts,{...contactForm,id:uid()}]; }
    else { nc=contacts.map(c=>c.id===editContact.id?{...c,...contactForm}:c); }
    setContacts(nc); persistContacts(nc); setEditContact(null); setIsAddingContact(false);
  };
  const deleteContact = id => { if(!window.confirm("Delete this contact?")) return; const nc=contacts.filter(c=>c.id!==id); setContacts(nc); persistContacts(nc); };

  // ── Warning mutations ──────────────────────────────────────────────────────
  const dismissWarning = id => { const nw=warnings.filter(w=>w.id!==id); setWarnings(nw); persistWarnings(nw); };

  // ── File handling ─────────────────────────────────────────────────────────
  // refEntryId: if set, we're uploading the actual content for an existing session ref entry
  const handleFileUpload = (e, taskId=null, refEntryId=null) => {
    const file=e.target.files?.[0]; if(!file) return;
    if(file.size>5*1024*1024){alert("File > 5 MB. Please compress first.");e.target.value="";return;}
    const reader=new FileReader();
    reader.onload=async ev=>{
      const data=ev.target.result;
      if(refEntryId){
        // Uploading actual content for an existing session ref — update it in place
        const nf=files.map(f=>f.id===refEntryId?{...f,data,size:file.size,uploadedAt:new Date().toISOString()}:f);
        setFiles(nf); await persistFileMeta(nf);
        try{await window.storage.set(`lv6-fd-${refEntryId}`,data);}catch(e){}
      } else {
        // Brand new user-uploaded file
        const id=uid();
        const taskName=taskId?(items.find(i=>i.id===taskId)?.task||""):null;
        const f={id,taskId,name:file.name,type:file.type,size:file.size,uploadedAt:new Date().toISOString(),data,taskName,isRef:false};
        const nf=[...files,f];
        setFiles(nf); await persistFileMeta(nf);
        try{await window.storage.set(`lv6-fd-${id}`,data);}catch(e){}
      }
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const openFile = async f => {
    let data = f.data;
    // Try loading from storage if not in memory
    if(!data){
      try{const r=await window.storage.get(`lv6-fd-${f.id}`);data=r?.value;}catch(e){}
    }
    if(!data){
      alert(`"${f.name}" hasn't been uploaded yet. Use the Upload button next to the file name to attach the actual file.`);
      return;
    }
    const a=document.createElement("a"); a.href=data; a.download=f.name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const deleteFile = async id => {
    if(!window.confirm("Remove this file?")) return;
    const nf=files.filter(f=>f.id!==id); setFiles(nf); await persistFileMeta(nf);
    try{await window.storage.delete(`lv6-fd-${id}`);}catch(e){}
  };

  // ── CSV/Excel import ────────────────────────────────────────────────────────
  const importTasks = async e => {
    const file=e.target.files?.[0]; if(!file) return;
    const ext=file.name.split(".").pop().toLowerCase();
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        let rows=[];
        if(ext==="csv"){
          const text=ev.target.result;
          const lines=text.split(/\r?\n/).filter(l=>l.trim());
          const hdrs=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/[\s\/\-]/g,""));
          const map={task:["task","actionitem","item","name"],cat:["cat","category"],priority:["priority","pri"],status:["status"],day:["day","timeline","target"],assigned:["assigned","assignee","owner"],cost:["cost","estcost"],purpose:["purpose","reason"],contact:["contact","contacts"],notes:["notes","comments"]};
          const colIdx={};
          Object.entries(map).forEach(([k,aliases])=>{const i=hdrs.findIndex(h=>aliases.includes(h));if(i>=0)colIdx[k]=i;});
          for(let i=1;i<lines.length;i++){
            const cols=lines[i].split(",");
            const get=k=>colIdx[k]!=null?(cols[colIdx[k]]||"").trim():"";
            if(!get("task")) continue;
            rows.push({task:get("task"),cat:get("cat")||CATS[0],priority:get("priority")||"Mandatory",status:get("status")||"Pending",day:get("day")||"Day 1",assigned:get("assigned")||"",cost:get("cost")||"",purpose:get("purpose")||"",contact:get("contact")||"",notes:get("notes")||""});
          }
        } else {
          alert("Excel import: please save your file as CSV first, then import.");return;
        }
        if(rows.length===0){alert("No tasks found. Make sure your file has a 'task' or 'item' column header.");return;}
        const maxId=Math.max(0,...items.map(i=>i.id));
        const newItems=rows.map((r,i)=>({...emptyTask(),...r,id:maxId+i+1,userNotes:"",_custom:true}));
        const ni=[...items,...newItems]; setItems(ni); persistItems(ni);
        alert(`✓ Imported ${newItems.length} tasks successfully.`);
      }catch(err){alert("Error reading file: "+err.message);}
    };
    if(ext==="csv") reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
    e.target.value="";
  };

  // ── Navigation ────────────────────────────────────────────────────────────
  const openDetail = item => { setSelected(item.id); setLocalNotes(item.userNotes||""); setView("detail"); };
  const openEditTask = item => { setTaskForm({task:item.task,cat:item.cat,priority:item.priority,day:item.day,assigned:item.assigned||"",cost:item.cost||"",purpose:item.purpose||"",contact:item.contact||"",notes:item.notes||"",userNotes:item.userNotes||"",status:item.status}); setIsAddingTask(false); setView("taskForm"); };
  const openAddTask  = ()   => { setTaskForm(emptyTask()); setIsAddingTask(true); setView("taskForm"); };
  const setTF = (k,v) => setTaskForm(p=>({...p,[k]:v}));
  const setCF = (k,v) => setContactForm(p=>({...p,[k]:v}));

  // ── Top Nav ────────────────────────────────────────────────────────────────
  const NAV = [{v:"dashboard",icon:"◈",label:"Dashboard"},{v:"tasks",icon:"☑",label:"Tasks"},{v:"contacts",icon:"☎",label:"Contacts"},{v:"files",icon:"📁",label:"Files"}];
  const navActive = v => {
    if(v==="tasks"&&["tasks","detail","taskForm"].includes(view)) return true;
    if(v==="contacts"&&["contacts","contactForm"].includes(view)) return true;
    return view===v;
  };

  const TopNav = () => (
    <div style={{background:"#0e0e0e",borderBottom:`1px solid ${T.border}`,display:"flex",flexShrink:0}}>
      {NAV.map(t=>{
        const active=navActive(t.v);
        return(
          <button key={t.v} onClick={()=>setView(t.v)}
            style={{flex:1,padding:"10px 0 8px",background:"transparent",border:"none",borderBottom:`2px solid ${active?T.accent:"transparent"}`,color:active?T.accent:T.muted,cursor:"pointer",fontFamily:T.F,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:17,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:9,letterSpacing:.3}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );

  // ────────────────────────────────────────────────────────────────────────────
  // ── DASHBOARD ───────────────────────────────────────────────────────────────
  const DashboardView = () => (
    <>
      <div style={{padding:"10px 14px 8px",background:"#101010",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{fontSize:9,letterSpacing:2,color:T.muted,textTransform:"uppercase"}}>287 S 6th West St · Bannock County · Idaho</div>
        <div style={{fontSize:17,fontWeight:700,color:T.text}}>Dashboard</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:12,paddingBottom:20}}>
        {/* Warnings */}
        {warnings.length>0&&(
          <div style={{marginBottom:14}}>
            {warnings.map(w=>(
              <div key={w.id} style={{background:w.level==="critical"?T.redDim:"#131004",border:`1px solid ${w.level==="critical"?T.red+"30":T.orange+"30"}`,borderRadius:12,padding:"11px 13px",marginBottom:8,position:"relative"}}>
                <button onClick={()=>dismissWarning(w.id)}
                  style={{position:"absolute",top:8,right:10,background:"transparent",border:"none",color:T.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"2px 6px",fontFamily:T.F}}>✕</button>
                <div style={{fontSize:11,fontWeight:700,color:w.level==="critical"?T.red:T.orange,marginBottom:4,paddingRight:24}}>{w.title}</div>
                <div style={{fontSize:11,color:w.level==="critical"?"#7a3838":"#8a6020",lineHeight:1.6}}>{w.body}</div>
              </div>
            ))}
          </div>
        )}
        {warnings.length===0&&(
          <div style={{background:T.greenDim,border:`1px solid ${T.green}30`,borderRadius:12,padding:"10px 13px",marginBottom:14,fontSize:12,color:T.green}}>
            ✓ All warnings dismissed
          </div>
        )}
        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[{lb:"Completion",v:`${pct}%`,s:`${done}/${items.length}`,c:T.accent},{lb:"Mandatory Pending",v:items.filter(i=>i.priority==="Mandatory"&&i.status==="Pending").length,s:"required",c:T.red},{lb:"High Priority",v:items.filter(i=>i.priority==="Highly Recommended"&&i.status==="Pending").length,s:"recommended",c:T.blue},{lb:"Files",v:files.length,s:"uploaded",c:T.green}].map(k=>(
            <div key={k.lb} style={{...card()}}>
              <div style={{fontSize:9,letterSpacing:1.5,color:T.muted,textTransform:"uppercase",marginBottom:4}}>{k.lb}</div>
              <div style={{fontSize:26,fontWeight:700,color:k.c,marginBottom:2}}>{k.v}</div>
              <div style={{fontSize:10,color:"#333"}}>{k.s}</div>
            </div>
          ))}
        </div>
        {/* Progress */}
        <div style={{...card(),marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:1.5,color:T.muted,textTransform:"uppercase",marginBottom:12}}>Progress by Category</div>
          {CATS.map(c=>{
            const t=items.filter(i=>i.cat===c).length;
            const d=items.filter(i=>i.cat===c&&i.status==="Complete").length;
            return(
              <div key={c} style={{marginBottom:9,cursor:"pointer"}} onClick={()=>{setFCat(c);setView("tasks");}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <div style={{fontSize:12,color:T.text}}>{c}</div>
                  <div style={{fontSize:10,color:T.muted}}>{d}/{t}</div>
                </div>
                <div style={{height:3,background:T.faint,borderRadius:2}}>
                  <div style={{height:"100%",width:`${t>0?d/t*100:0}%`,background:T.purple,borderRadius:2}}/>
                </div>
              </div>
            );
          })}
        </div>
        {/* Critical */}
        <div style={{background:T.redDim,border:`1px solid ${T.red}20`,borderRadius:14,padding:14}}>
          <div style={{fontSize:10,letterSpacing:1.5,color:T.red,textTransform:"uppercase",marginBottom:12}}>Critical Issues — Resolve First</div>
          {[["Dev Agreement may be UNSIGNED","Demand fully executed, recorded copy. If unexecuted — potential deal-stopper."],["STR Moratorium + No Signed Agreement","No vested rights. Attorney must evaluate both issues together immediately."],["$110k Lien — No Reconveyance Found","Instrument #20709541. Search Bannock Recorder; demand seller release."],["CKJ Ventures Idaho Registration Unconfirmed","Search sosbiz.idaho.gov for Idaho foreign qualification."],["IDWR Water/Geothermal Rights Unverified","Search research.idwr.idaho.gov for all water and geothermal rights."]].map(([t,d],i)=>(
            <div key={i} style={{paddingBottom:9,marginBottom:9,borderBottom:i<4?`1px solid #2a0808`:"none"}}>
              <div style={{fontSize:13,fontWeight:600,color:"#d07070",marginBottom:2}}>{t}</div>
              <div style={{fontSize:12,color:"#7a3838",lineHeight:1.5}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );

  // ────────────────────────────────────────────────────────────────────────────
  // ── TASKS LIST ───────────────────────────────────────────────────────────────
  const TasksView = () => (
    <>
      <div style={{padding:"10px 14px 8px",background:"#101010",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{fontSize:9,letterSpacing:2,color:T.muted,textTransform:"uppercase"}}>Lava Hot Springs</div>
            <div style={{fontSize:17,fontWeight:700,color:T.text}}>Tasks</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:700,color:T.accent}}>{pct}%</div>
              <div style={{fontSize:9,color:T.muted}}>{done}/{items.length}</div>
            </div>
          </div>
        </div>
        <div style={{height:3,background:T.faint,borderRadius:2,marginBottom:8}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${T.purple},${T.accent})`,borderRadius:2}}/>
        </div>
        {/* Filter row */}
        <div style={{display:"flex",gap:7,marginBottom:7}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks…"
            style={{...inp(),padding:"9px 12px",fontSize:14,flex:1}}/>
          <button onClick={()=>setShowFilters(p=>!p)}
            style={{padding:"9px 13px",background:activeFilters>0||showFilters?T.accentDim:T.high,border:`1px solid ${activeFilters>0?T.accent:T.border}`,borderRadius:10,color:activeFilters>0?T.accent:T.muted,cursor:"pointer",fontFamily:T.F,fontSize:12,flexShrink:0}}>

            <span style={{fontSize:11,padding:"3px 9px",borderRadius:16,border:`1px solid ${PC[selItem.priority]||T.muted}50`,color:PC[selItem.priority]||T.muted}}>{selItem.priority}</span>
            <span style={{fontSize:11,color:T.muted}}>{selItem.day}</span>

          </div>
          <div style={{...card(),marginBottom:12}}>

              <div key={l} style={{display:"flex",justifyContent:"space-between",paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${T.faint}`}}>
                <div style={{fontSize:12,color:T.muted}}>{l}</div>

          {selItem.notes&&(
            <div style={{background:"#130e05",border:`1px solid ${T.accent}30`,borderRadius:14,padding:14,marginBottom:12}}>

            </div>

            {/* User-uploaded files — fully clickable */}

              <div key={f.id} onClick={()=>openFile(f)}

                  <div style={{fontSize:13,color:T.blue,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>

          <div key={k} style={{marginBottom:12}}>

      </div>

          {groups.filter(g=>vis.some(c=>c.group===g)).map(grp=>(
            <div key={grp} style={{marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:2,color:T.muted,textTransform:"uppercase",marginBottom:8,paddingLeft:4}}>{grp}</div>
              {vis.filter(c=>c.group===grp).map(c=>(
                <div key={c.id} style={{...card({padding:"12px 14px"}),marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                    <div style={{fontSize:14,fontWeight:600,color:T.text,flex:1,marginRight:8}}>{c.name}</div>
                    <div style={{display:"flex",gap:5}}>
                      {c.phone&&<a href={`tel:${c.phone}`} style={{padding:"5px 10px",background:T.greenDim,border:`1px solid ${T.green}40`,borderRadius:7,color:T.green,fontSize:11,textDecoration:"none",fontFamily:T.F}}>📞</a>}
                      <button onClick={()=>{setContactForm({name:c.name,group:c.group,role:c.role||"",phone:c.phone||"",email:c.email||"",web:c.web||"",note:c.note||""});setEditContact(c);setIsAddingContact(false);}}
                        style={{padding:"5px 10px",background:T.accentDim,border:`1px solid ${T.accent}40`,borderRadius:7,color:T.accent,cursor:"pointer",fontFamily:T.F,fontSize:11}}>✎</button>
                    </div>
                  </div>
                  {c.role&&<div style={{fontSize:12,color:T.muted,marginBottom:c.phone||c.email||c.web?4:0}}>{c.role}</div>}
                  {c.phone&&<div style={{fontSize:12,color:T.text,marginBottom:2}}>{c.phone}</div>}
                  {c.email&&<div style={{fontSize:12,color:T.blue,marginBottom:2,wordBreak:"break-all"}}>{c.email}</div>}
                  {c.web&&<div style={{fontSize:12,color:T.blue,marginBottom:2,wordBreak:"break-all"}}>{c.web}</div>}
                  {c.note&&<div style={{fontSize:11,color:"#484440",marginTop:4,lineHeight:1.5}}>{c.note}</div>}
                </div>
              ))}
            </div>
          ))}
        </div>
      </>
    );
  };

  // ────────────────────────────────────────────────────────────────────────────
  // ── GLOBAL FILES ─────────────────────────────────────────────────────────────
  const FilesView = () => {
    const uploadedCount = files.filter(f=>f.data).length;
    const refCount = files.filter(f=>f.isRef&&!f.data).length;
    // Deduplicate session refs by refId for display (show each doc once, list tasks)
    const refsByRefId = {};
    files.filter(f=>f.isRef).forEach(f=>{
      if(!refsByRefId[f.refId]) refsByRefId[f.refId]={...f,taskIds:[f.taskId]};
      else refsByRefId[f.refId].taskIds.push(f.taskId);
    });
    const uniqueRefs = Object.values(refsByRefId);
    const userUploads = files.filter(f=>!f.isRef);
    const visUploads = userUploads.filter(f=>!fileSearch||f.name.toLowerCase().includes(fileSearch.toLowerCase())||(f.taskName||"").toLowerCase().includes(fileSearch.toLowerCase()));
    const visRefs = uniqueRefs.filter(f=>!fileSearch||f.name.toLowerCase().includes(fileSearch.toLowerCase()));
    // Per-ref upload refs for global files view
    const gRefInputs = useRef({});

    return(
      <>
        <div style={{padding:"10px 14px 8px",background:"#101010",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:T.text}}>Files</div>
              <div style={{fontSize:10,color:T.muted}}>{uploadedCount} uploaded · {refCount} session refs pending</div>
            </div>
            <input ref={globalFileRef} type="file" style={{display:"none"}} onChange={e=>handleFileUpload(e,null)}/>
            <button onClick={()=>globalFileRef.current?.click()}
              style={{padding:"7px 14px",background:T.accentDim,border:`1px solid ${T.accent}50`,borderRadius:9,color:T.accent,cursor:"pointer",fontFamily:T.F,fontSize:13,fontWeight:600}}>
              + Upload
            </button>
          </div>
          <input value={fileSearch} onChange={e=>setFileSearch(e.target.value)} placeholder="Search files…"
            style={{...inp(),padding:"9px 12px",fontSize:14}}/>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:10,paddingBottom:20}}>

          {/* User uploads */}
          {visUploads.length>0&&(
            <div style={{marginBottom:18}}>
              <div style={{fontSize:10,letterSpacing:2,color:T.muted,textTransform:"uppercase",marginBottom:8,paddingLeft:4}}>Uploaded Files ({visUploads.length})</div>
              {visUploads.map(f=>(
                <div key={f.id} onClick={()=>openFile(f)}
                  style={{display:"flex",gap:10,alignItems:"center",padding:"11px 13px",background:T.surface,borderRadius:12,marginBottom:6,cursor:"pointer",border:`1px solid ${T.border}`}}>
                  <span style={{fontSize:22,flexShrink:0}}>{extIcon(f.name)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,color:T.blue,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                    <div style={{fontSize:10,color:T.muted}}>{fmtSize(f.size)} · {f.uploadedAt?new Date(f.uploadedAt).toLocaleDateString():"—"}{f.taskName?` · Task: ${f.taskName.slice(0,40)}`:""}</div>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <div style={{padding:"5px 9px",background:T.blueDim,border:`1px solid ${T.blue}30`,borderRadius:7,color:T.blue,fontSize:11}}>Open</div>
                    <button onClick={e=>{e.stopPropagation();deleteFile(f.id);}}
                      style={{padding:"5px 9px",background:T.redDim,border:`1px solid ${T.red}30`,borderRadius:7,color:T.red,cursor:"pointer",fontFamily:T.F,fontSize:11}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Session reference docs */}
          {visRefs.length>0&&(
            <div style={{marginBottom:18}}>
              <div style={{fontSize:10,letterSpacing:2,color:T.muted,textTransform:"uppercase",marginBottom:8,paddingLeft:4}}>Session Documents ({visRefs.length})</div>
              {visRefs.map(f=>{
                const hasData=!!f.data;
                // Find actual entries for all tasks to get per-task IDs for uploading
                const allEntries=files.filter(ff=>ff.isRef&&ff.refId===f.refId);
                const firstEntry=allEntries[0];
                return(
                  <div key={f.refId} style={{marginBottom:8}}>
                    <div onClick={()=>openFile(firstEntry||f)}
                      style={{display:"flex",gap:10,alignItems:"center",padding:"11px 13px",
                        background:hasData?"#0a1a0e":T.surface,borderRadius:12,
                        border:`1px solid ${hasData?T.green+"40":T.border}`,
                        cursor:hasData?"pointer":"default"}}>
                      <span style={{fontSize:22,flexShrink:0,opacity:hasData?1:.4}}>{extIcon(f.name)}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,color:hasData?T.blue:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                        {f.warn&&<div style={{fontSize:10,color:"#7a4a18",marginTop:1}}>{f.warn}</div>}
                        <div style={{fontSize:10,color:hasData?T.green:"#383838",marginTop:1}}>
                          {hasData?`✓ Uploaded · tap to open`:`Linked to ${f.taskIds?.length||1} task(s) · not yet uploaded`}
                        </div>
                      </div>
                      {hasData&&<span style={{fontSize:13,color:T.green}}>↗</span>}
                    </div>
                    {!hasData&&firstEntry&&(
                      <>
                        <input type="file" style={{display:"none"}}
                          ref={el=>{if(el)gRefInputs.current[f.refId]=el;}}
                          onChange={e=>{
                            // Upload this ref for all task linkages
                            const file2=e.target.files?.[0];if(!file2)return;
                            const reader=new FileReader();
                            reader.onload=async ev=>{
                              const data=ev.target.result;
                              const nf=files.map(ff=>ff.isRef&&ff.refId===f.refId?{...ff,data,size:file2.size,uploadedAt:new Date().toISOString()}:ff);
                              setFiles(nf);await persistFileMeta(nf);
                              // Save data under first entry id (all share same content)
                              try{await window.storage.set(`lv6-fd-${firstEntry.id}`,data);}catch(err){}
                            };
                            reader.readAsDataURL(file2);
                            e.target.value="";
                          }}/>
                        <button onClick={()=>gRefInputs.current[f.refId]?.click()}
                          style={{width:"100%",marginTop:3,padding:"8px",background:T.faint,border:`1px dashed #2a2a2a`,borderRadius:8,color:"#555",cursor:"pointer",fontFamily:T.F,fontSize:11}}>
                          ↑ Upload "{f.name}"
                        </button>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {files.length===0&&(
            <div style={{textAlign:"center",padding:"48px 16px",color:T.muted}}>
              <div style={{fontSize:40,marginBottom:8}}>📁</div>
              <div style={{fontSize:14}}>No files yet</div>
            </div>
          )}
        </div>
      </>
    );
  };

  // ─── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div style={{maxWidth: '540px', margin: '0 auto', height: '100vh', display: 'flex', flexDirection: 'column', background: T.bg, color: T.text, fontFamily: T.F, overflow: 'hidden', position: 'relative'}}>
      <TopNav />
      {view === "dashboard" && <DashboardView />}
      {view === "tasks" && <TasksView />}
      {view === "detail" && <TaskDetail />}
      {view === "taskForm" && <TaskFormView />}
      {view === "contacts" && <ContactsView />}
      {view === "contactForm" && <ContactsView />}
      {view === "files" && <FilesView />}
      <style>{`
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #282828; border-radius: 2px; }
        select, input, textarea { -webkit-appearance: none; }
      `}</style>
    </div>
  );

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
